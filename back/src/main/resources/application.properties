spring.application.name=back

# Server
server.port=8080

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# JPA(Entity를 이용한 데이터베이스 사용)
spring.jpa.hibernate.ddl-auto=update
# JPA적용할 데이터베이스 문법지정 (MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 실행되는 SQL 쿼리를 콘솔에 로그로 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# DevTools
# Java 수정시 자동으로 서버를 재실행
spring.devtools.restart.enabled=true


# Swagger UI 접속 경로 설정 (기본값은 /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
# API 문서 자동 생성 경로 설정
springdoc.api-docs.path=/api-docs
# Swagger에서 표시될 기본 데이터 포맷 설정
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json


# 파일 저장 경로
file.dir = ${FILE_PATH}

# 파일 용량 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB


# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=300000      # 액세스 토큰 만료 5분
jwt.refresh-expiration-ms=1209600000  # 리프레시 토큰 만료 14일

# Logging (필터 작동 확인용)
logging.level.org.springframework.security=DEBUG
